<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reversi-3D 6×6</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Reversi 3D</h1>

    <!-- Setup Panel -->
    <div id="setup-panel" style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
      <h2 class="setup-heading">Welcome to Reversi 3D!</h2>
      <div class="setup-grid">
        <div class="setup-row">
          <label>Board Size <span class="setup-hint">(6–20, even)</span></label>
          <input type="number" id="setup-size" value="6" min="6" max="20" step="2">
          <span class="setup-err" id="setup-size-err"></span>
        </div>
        <div class="setup-row">
          <label>Number of Layers <span class="setup-hint">(1–10)</span></label>
          <input type="number" id="setup-layers" value="3" min="1" max="10" step="1">
          <span class="setup-err" id="setup-layers-err"></span>
        </div>
      </div>
      <button id="start-game-btn">Start Game</button>
    </div>

    <!-- Game Panel -->
    <div id="game-panel" style="display: none; flex-direction: column; align-items: center; gap: 20px;">
      <div class="scores">
        <div class="score">
          <span class="piece-icon black"></span>
          <span id="black-count">2</span>
        </div>
        <div class="score">
          <span class="piece-icon white"></span>
          <span id="white-count">2</span>
        </div>
      </div>
      <div id="status" class="status"></div>
      <div class="scene" id="scene">
        <div class="board-3d" id="board-3d">
          <div id="board-container" class="board-container"></div>
        </div>
        <div class="axis-wrapper">
          <div class="axis-3d">
            <div class="axis-3d-line"></div>
            <div class="axis-3d-label">Z</div>
          </div>
        </div>
      </div>
      <div class="controls-row">
        <div class="spacing-control">
          <label>Layer Gap (px)</label>
          <button id="space-down">▼</button>
          <input type="number" id="space-input" value="60" min="10" max="200" step="5">
          <button id="space-up">▲</button>
        </div>
        <div class="spacing-control">
          <label>Inactive Layer Opacity (%)</label>
          <button id="opacity-down">▼</button>
          <input type="number" id="opacity-input" value="25" min="5" max="100" step="5">
          <button id="opacity-up">▲</button>
          <span class="setup-err" id="opacity-err"></span>
        </div>
        <div class="spacing-control">
          <label>View Angle (º)</label>
          <button id="angle-down">▼</button>
          <input type="number" id="angle-input" value="64" min="0" max="89" step="1">
          <button id="angle-up">▲</button>
          <span class="setup-err" id="angle-err"></span>
        </div>
      </div>
      <div class="key-hints">
        <span>&#8593;&#8595; Switch layer</span>
        <span>&#8592;&#8594; Rotate view</span>
      </div>
      <button id="new-game-btn">New Game</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
